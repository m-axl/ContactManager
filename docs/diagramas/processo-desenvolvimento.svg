<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .box { fill: #e1f5ff; stroke: #01579b; stroke-width: 2; }
      .text { font-family: Arial, sans-serif; font-size: 12px; text-anchor: middle; }
      .arrow { stroke: #01579b; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#01579b" />
    </marker>
  </defs>
  
  <!-- Boxes -->
  <rect class="box" x="20" y="20" width="100" height="50" rx="5"/>
  <text class="text" x="70" y="50">Requisitos</text>
  
  <rect class="box" x="150" y="20" width="100" height="50" rx="5"/>
  <text class="text" x="200" y="50">Análise</text>
  
  <rect class="box" x="280" y="20" width="100" height="50" rx="5"/>
  <text class="text" x="330" y="50">Modelagem</text>
  
  <rect class="box" x="410" y="20" width="100" height="50" rx="5"/>
  <text class="text" x="460" y="50">Implementação</text>
  
  <rect class="box" x="540" y="20" width="100" height="50" rx="5"/>
  <text class="text" x="590" y="50">Testes</text>
  
  <rect class="box" x="20" y="120" width="100" height="50" rx="5"/>
  <text class="text" x="70" y="150">Documentação</text>
  
  <rect class="box" x="150" y="120" width="100" height="50" rx="5"/>
  <text class="text" x="200" y="150">Entrega</text>
  
  <!-- Arrows -->
  <path class="arrow" d="M 120 45 L 150 45"/>
  <path class="arrow" d="M 250 45 L 280 45"/>
  <path class="arrow" d="M 380 45 L 410 45"/>
  <path class="arrow" d="M 510 45 L 540 45"/>
  <path class="arrow" d="M 590 70 L 590 100 L 70 100 L 70 120"/>
  <path class="arrow" d="M 120 145 L 150 145"/>
  <path class="arrow" d="M 200 95 L 200 120"/>
  
  <!-- Title -->
  <text class="text" x="400" y="280" style="font-size: 14px; font-weight: bold;">Processo Simplificado de SDLC</text>
</svg>
