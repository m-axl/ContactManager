<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .class-box { fill: #fff9c4; stroke: #f57f17; stroke-width: 2; }
      .class-header { fill: #fff59d; stroke: #f57f17; stroke-width: 1; }
      .text { font-family: Arial, sans-serif; font-size: 11px; }
      .class-name { font-weight: bold; text-anchor: middle; }
      .method { text-anchor: start; font-size: 10px; }
      .arrow { stroke: #333; stroke-width: 2; fill: none; marker-end: url(#arrowhead-solid); }
      .inheritance { stroke: #333; stroke-width: 2; fill: none; marker-end: url(#arrowhead-empty); }
    </style>
    <marker id="arrowhead-solid" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333" />
    </marker>
    <marker id="arrowhead-empty" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="white" stroke="#333" stroke-width="1" />
    </marker>
  </defs>
  
  <!-- ContactManager Class -->
  <rect class="class-box" x="20" y="20" width="140" height="80" rx="5"/>
  <rect class="class-header" x="20" y="20" width="140" height="25"/>
  <text class="text class-name" x="90" y="40">ContactManager</text>
  <line x1="20" y1="45" x2="160" y2="45" stroke="#f57f17" stroke-width="1"/>
  <text class="text method" x="30" y="65">+main()</text>
  
  <!-- Menu Class -->
  <rect class="class-box" x="200" y="20" width="140" height="120" rx="5"/>
  <rect class="class-header" x="200" y="20" width="140" height="25"/>
  <text class="text class-name" x="270" y="40">Menu</text>
  <line x1="200" y1="45" x2="340" y2="45" stroke="#f57f17" stroke-width="1"/>
  <text class="text method" x="210" y="65">+mostrarMenu()</text>
  <text class="text method" x="210" y="80">+receberOpcao()</text>
  <text class="text method" x="210" y="95">+executarOpcao()</text>
  
  <!-- Agenda Class -->
  <rect class="class-box" x="380" y="20" width="140" height="140" rx="5"/>
  <rect class="class-header" x="380" y="20" width="140" height="25"/>
  <text class="text class-name" x="450" y="40">Agenda</text>
  <line x1="380" y1="45" x2="520" y2="45" stroke="#f57f17" stroke-width="1"/>
  <text class="text method" x="390" y="65">+adicionarContato()</text>
  <text class="text method" x="390" y="80">+listarContatos()</text>
  <text class="text method" x="390" y="95">+buscarContato()</text>
  <text class="text method" x="390" y="110">+removerContato()</text>
  
  <!-- Persistencia Class -->
  <rect class="class-box" x="560" y="20" width="140" height="100" rx="5"/>
  <rect class="class-header" x="560" y="20" width="140" height="25"/>
  <text class="text class-name" x="630" y="40">Persistencia</text>
  <line x1="560" y1="45" x2="700" y2="45" stroke="#f57f17" stroke-width="1"/>
  <text class="text method" x="570" y="65">+salvarContatos()</text>
  <text class="text method" x="570" y="80">+carregarContatos()</text>
  
  <!-- Contato Class -->
  <rect class="class-box" x="300" y="280" width="140" height="120" rx="5"/>
  <rect class="class-header" x="300" y="280" width="140" height="25"/>
  <text class="text class-name" x="370" y="300">Contato</text>
  <line x1="300" y1="305" x2="440" y2="305" stroke="#f57f17" stroke-width="1"/>
  <text class="text method" x="310" y="325">-nome: string</text>
  <text class="text method" x="310" y="340">-telefone: string</text>
  <text class="text method" x="310" y="355">-email: string</text>
  <line x1="300" y1="360" x2="440" y2="360" stroke="#f57f17" stroke-width="1"/>
  <text class="text method" x="310" y="380">+toString()</text>
  
  <!-- Connections -->
  <!-- ContactManager -> Menu -->
  <path class="arrow" d="M 160 60 L 200 60"/>
  
  <!-- Menu -> Agenda -->
  <path class="arrow" d="M 340 60 L 380 60"/>
  
  <!-- Menu -> Persistencia -->
  <path class="arrow" d="M 340 80 L 560 60"/>
  
  <!-- Agenda -> Contato -->
  <path class="arrow" d="M 450 160 L 390 280"/>
  
  <!-- Persistencia -> Contato -->
  <path class="arrow" d="M 630 120 L 420 280"/>
</svg>
