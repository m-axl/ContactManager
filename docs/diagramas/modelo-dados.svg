<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .entity { fill: #e8f5e9; stroke: #2e7d32; stroke-width: 2; }
      .attribute { fill: #fff9c4; stroke: #f57f17; stroke-width: 1; }
      .text { font-family: Arial, sans-serif; font-size: 11px; text-anchor: start; }
      .entity-name { font-weight: bold; font-size: 12px; text-anchor: middle; }
      .relation-line { stroke: #333; stroke-width: 2; fill: none; }
      .cardinality { font-family: Arial, sans-serif; font-size: 10px; }
    </style>
  </defs>
  
  <!-- USUARIO Entity -->
  <rect class="entity" x="20" y="80" width="140" height="200" rx="5"/>
  <rect class="entity" x="20" y="80" width="140" height="30" fill="#c8e6c9"/>
  <text class="entity-name" x="90" y="102">USUARIO</text>
  <line x1="20" y1="110" x2="160" y2="110" stroke="#2e7d32" stroke-width="1"/>
  
  <!-- USUARIO Attributes -->
  <text class="text" x="30" y="130">id (PK)</text>
  <text class="text" x="30" y="150">nome (UK)</text>
  <text class="text" x="30" y="170">email (UK)</text>
  <text class="text" x="30" y="190">data_criacao</text>
  <text class="text" x="30" y="210">TIMESTAMP</text>
  
  <!-- CONTATO Entity -->
  <rect class="entity" x="250" y="80" width="140" height="220" rx="5"/>
  <rect class="entity" x="250" y="80" width="140" height="30" fill="#c8e6c9"/>
  <text class="entity-name" x="320" y="102">CONTATO</text>
  <line x1="250" y1="110" x2="390" y2="110" stroke="#2e7d32" stroke-width="1"/>
  
  <!-- CONTATO Attributes -->
  <text class="text" x="260" y="130">id (PK)</text>
  <text class="text" x="260" y="150">usuario_id (FK)</text>
  <text class="text" x="260" y="170">nome</text>
  <text class="text" x="260" y="190">sobrenome</text>
  <text class="text" x="260" y="210">categoria</text>
  <text class="text" x="260" y="230">data_criacao</text>
  <text class="text" x="260" y="250">data_atualizacao</text>
  
  <!-- TELEFONE Entity -->
  <rect class="entity" x="480" y="80" width="140" height="160" rx="5"/>
  <rect class="entity" x="480" y="80" width="140" height="30" fill="#c8e6c9"/>
  <text class="entity-name" x="550" y="102">TELEFONE</text>
  <line x1="480" y1="110" x2="620" y2="110" stroke="#2e7d32" stroke-width="1"/>
  
  <!-- TELEFONE Attributes -->
  <text class="text" x="490" y="130">id (PK)</text>
  <text class="text" x="490" y="150">contato_id (FK)</text>
  <text class="text" x="490" y="170">numero (UK)</text>
  <text class="text" x="490" y="190">tipo</text>
  <text class="text" x="490" y="210">VARCHAR(20)</text>
  
  <!-- EMAIL Entity -->
  <rect class="entity" x="710" y="80" width="140" height="160" rx="5"/>
  <rect class="entity" x="710" y="80" width="140" height="30" fill="#c8e6c9"/>
  <text class="entity-name" x="780" y="102">EMAIL</text>
  <line x1="710" y1="110" x2="850" y2="110" stroke="#2e7d32" stroke-width="1"/>
  
  <!-- EMAIL Attributes -->
  <text class="text" x="720" y="130">id (PK)</text>
  <text class="text" x="720" y="150">contato_id (FK)</text>
  <text class="text" x="720" y="170">endereco (UK)</text>
  <text class="text" x="720" y="190">tipo</text>
  <text class="text" x="720" y="210">VARCHAR(20)</text>
  
  <!-- Relationships -->
  <!-- USUARIO to CONTATO (1:Many) -->
  <line class="relation-line" x1="160" y1="180" x2="250" y2="180"/>
  <text class="cardinality" x="170" y="175">1</text>
  <text class="cardinality" x="230" y="175">M</text>
  <text class="entity-name" x="200" y="160" style="font-size: 10px;">tem</text>
  
  <!-- CONTATO to TELEFONE (1:Many) -->
  <line class="relation-line" x1="390" y1="150" x2="480" y2="150"/>
  <text class="cardinality" x="400" y="145">1</text>
  <text class="cardinality" x="460" y="145">M</text>
  <text class="entity-name" x="430" y="130" style="font-size: 10px;">possui</text>
  
  <!-- CONTATO to EMAIL (1:Many) -->
  <line class="relation-line" x1="390" y1="200" x2="710" y2="200"/>
  <text class="cardinality" x="400" y="195">1</text>
  <text class="cardinality" x="690" y="195">M</text>
  <text class="entity-name" x="540" y="180" style="font-size: 10px;">possui</text>
  
  <!-- Legend -->
  <text style="font-family: Arial; font-size: 12px; font-weight: bold;" x="20" y="330">Legenda:</text>
  <text style="font-family: Arial; font-size: 10px;" x="20" y="350">PK = Primary Key (Chave Primária)</text>
  <text style="font-family: Arial; font-size: 10px;" x="20" y="365">FK = Foreign Key (Chave Estrangeira)</text>
  <text style="font-family: Arial; font-size: 10px;" x="20" y="380">UK = Unique Key (Chave Única)</text>
  <text style="font-family: Arial; font-size: 10px;" x="20" y="395">1 = Um / M = Muitos</text>
</svg>
