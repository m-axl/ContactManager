<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .actor { fill: #fff3e0; stroke: #e65100; stroke-width: 2; }
      .usecase { fill: #f3e5f5; stroke: #6a1b9a; stroke-width: 2; }
      .system { fill: #e0f2f1; stroke: #00695c; stroke-width: 2; }
      .text { font-family: Arial, sans-serif; font-size: 11px; text-anchor: middle; }
      .arrow { stroke: #424242; stroke-width: 1.5; fill: none; }
    </style>
  </defs>
  
  <!-- Actor (Usuário) -->
  <circle class="actor" cx="80" cy="200" r="25"/>
  <text class="text" x="80" y="260" style="font-size: 12px;">Usuário</text>
  
  <!-- System boundary -->
  <rect class="system" x="150" y="50" width="400" height="300" rx="10" fill="none"/>
  <text class="text" x="350" y="70" style="font-size: 12px; font-weight: bold;">ContactManager</text>
  
  <!-- Use Cases -->
  <ellipse class="usecase" cx="280" cy="100" rx="50" ry="25"/>
  <text class="text" x="280" y="105">Adicionar</text>
  
  <ellipse class="usecase" cx="280" cy="160" rx="50" ry="25"/>
  <text class="text" x="280" y="165">Listar</text>
  
  <ellipse class="usecase" cx="280" cy="220" rx="50" ry="25"/>
  <text class="text" x="280" y="225">Buscar</text>
  
  <ellipse class="usecase" cx="280" cy="280" rx="50" ry="25"/>
  <text class="text" x="280" y="285">Remover</text>
  
  <ellipse class="usecase" cx="430" cy="130" rx="50" ry="25"/>
  <text class="text" x="430" y="135">Salvar</text>
  
  <ellipse class="usecase" cx="430" cy="230" rx="50" ry="25"/>
  <text class="text" x="430" y="235">Carregar</text>
  
  <!-- Connections -->
  <line class="arrow" x1="105" y1="180" x2="230" y2="100" marker-end="url(#arrowhead)"/>
  <line class="arrow" x1="105" y1="200" x2="230" y2="160" marker-end="url(#arrowhead)"/>
  <line class="arrow" x1="105" y1="220" x2="230" y2="220" marker-end="url(#arrowhead)"/>
  <line class="arrow" x1="105" y1="240" x2="230" y2="280" marker-end="url(#arrowhead)"/>
  
  <line class="arrow" x1="330" y1="100" x2="380" y2="130" marker-end="url(#arrowhead)"/>
  <line class="arrow" x1="330" y1="280" x2="380" y2="230" marker-end="url(#arrowhead)"/>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#424242" />
    </marker>
  </defs>
</svg>
