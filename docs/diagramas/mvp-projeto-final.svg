<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420">
  <style>
    .bg { fill: #f8fafc; }
    .card { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 14; }
    .title { font: bold 22px sans-serif; fill: #0f172a; }
    .subtitle { font: 14px sans-serif; fill: #334155; }
    .text { font: 12px sans-serif; fill: #475569; }
    .line { stroke: #334155; stroke-width: 2; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#334155" />
    </marker>
  </defs>
  <rect class="bg" width="900" height="420" rx="20" />
  <text x="50" y="60" class="title">MVP planejado - ContactManager</text>
  <text x="50" y="88" class="subtitle">Diagrama de visão geral do produto final</text>

  <rect class="card" x="50" y="120" width="260" height="180" />
  <text x="70" y="155" class="title">Terminal</text>
  <text x="70" y="183" class="text">- Menu de navegação</text>
  <text x="70" y="203" class="text">- Opções de CRUD</text>
  <text x="70" y="223" class="text">- Mensagens e confirmações</text>

  <rect class="card" x="340" y="70" width="260" height="230" />
  <text x="360" y="110" class="title">Lógica de Contatos</text>
  <text x="360" y="138" class="text">- Adicionar contato</text>
  <text x="360" y="158" class="text">- Listar contatos</text>
  <text x="360" y="178" class="text">- Buscar contatos</text>
  <text x="360" y="198" class="text">- Remover contatos</text>
  <text x="360" y="218" class="text">- Validação de entradas</text>

  <rect class="card" x="630" y="170" width="220" height="130" />
  <text x="650" y="205" class="title">Persistência</text>
  <text x="650" y="233" class="text">- Salvar em arquivo</text>
  <text x="650" y="253" class="text">- Carregar ao iniciar</text>
  <text x="650" y="273" class="text">- Manter dados entre execuções</text>

  <line class="line" x1="310" y1="210" x2="340" y2="210" />
  <line class="line" x1="600" y1="210" x2="630" y2="210" />
</svg>
